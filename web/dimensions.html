<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DKB — 차원 모델</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dkb: { bg: '#111827', card: '#1f2937', accent: '#6c9bff' } },
        },
      },
    };
  </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen antialiased" data-page="dimensions">
  <header class="border-b border-gray-800 bg-gray-950/80 backdrop-blur sticky top-0 z-20">
    <div class="max-w-[1400px] mx-auto px-4 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div class="flex items-center gap-4">
        <a href="index.html" class="text-lg font-bold bg-gradient-to-r from-blue-400 to-violet-400 bg-clip-text text-transparent">DKB</a>
        <nav class="flex flex-wrap gap-3 text-sm text-gray-400">
          <a href="browse.html" class="hover:text-white">탐색</a>
          <span class="text-white">차원</span>
          <a href="compare.html" class="hover:text-white">비교</a>
          <a href="index.html" class="hover:text-white">소개</a>
        </nav>
      </div>
      <p class="text-xs text-gray-500 max-w-lg">6개 그룹 · 34개 차원. 그룹을 눌러 요약을, 차원을 눌러 분포와 상·하위 디렉티브를 확인하세요.</p>
    </div>
  </header>

  <main class="max-w-[1400px] mx-auto px-4 py-6">
    <div class="flex flex-col lg:flex-row gap-6 lg:gap-8 min-h-[60vh]">
      <aside class="lg:w-72 shrink-0 lg:max-h-[calc(100vh-6rem)] lg:overflow-y-auto rounded-xl border border-gray-800 bg-gray-950/50 p-3">
        <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 px-2">트리</h2>
        <ul id="dkb-dim-tree" class="space-y-1 list-none p-0 m-0"></ul>
      </aside>
      <article id="dkb-dim-detail" class="flex-1 min-w-0 rounded-xl border border-gray-800 bg-gray-800/20 p-4 sm:p-6">
        <p class="text-gray-500 text-sm">카탈로그를 불러오는 중…</p>
      </article>
    </div>
  </main>
  <script src="js/dimensions-explorer.js"></script>
</body>
</html>
