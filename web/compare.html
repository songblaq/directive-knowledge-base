<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DKB — Compare</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen antialiased" data-page="compare">
  <header class="border-b border-gray-800 bg-gray-950/80 backdrop-blur">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div class="flex items-center gap-4">
        <a href="index.html" class="text-lg font-bold bg-gradient-to-r from-blue-400 to-violet-400 bg-clip-text text-transparent">DKB</a>
        <nav class="flex gap-3 text-sm text-gray-400">
          <a href="browse.html" class="hover:text-white">탐색</a>
          <span class="text-white">비교</span>
          <a href="index.html" class="hover:text-white">소개</a>
        </nav>
      </div>
      <p class="text-xs text-gray-500">시나리오 B: 두 디렉티브를 나란히 — Δ 열은 B−A 그룹 평균 차이입니다.</p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
      <div>
        <label for="dkb-compare-a" class="block text-xs text-gray-500 mb-2">디렉티브 A</label>
        <select id="dkb-compare-a" class="w-full rounded-xl border border-gray-700 bg-gray-800 px-3 py-2.5 text-sm text-gray-100 focus:ring-2 focus:ring-blue-500/50"></select>
      </div>
      <div>
        <label for="dkb-compare-b" class="block text-xs text-gray-500 mb-2">디렉티브 B</label>
        <select id="dkb-compare-b" class="w-full rounded-xl border border-gray-700 bg-gray-800 px-3 py-2.5 text-sm text-gray-100 focus:ring-2 focus:ring-violet-500/50"></select>
      </div>
    </div>

    <div id="dkb-compare-output" class="mb-8"></div>

    <div class="rounded-xl border border-gray-800 bg-gray-800/20 p-4">
      <canvas id="dkb-compare-chart" height="280"></canvas>
    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
