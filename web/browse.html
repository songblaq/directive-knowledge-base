<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DKB — Browse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dkb: { bg: '#111827', card: '#1f2937', accent: '#6c9bff' }
          }
        }
      }
    };
  </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen antialiased" data-page="browse">
  <header class="border-b border-gray-800 bg-gray-950/80 backdrop-blur sticky top-0 z-30">
    <div class="max-w-[1600px] mx-auto px-4 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div class="flex items-center gap-4">
        <a href="index.html" class="text-lg font-bold bg-gradient-to-r from-blue-400 to-violet-400 bg-clip-text text-transparent">DKB</a>
        <nav class="flex flex-wrap gap-3 text-sm text-gray-400">
          <span class="text-white">탐색</span>
          <a href="dimensions.html" class="hover:text-white">차원</a>
          <a href="compare.html" class="hover:text-white">비교</a>
          <a href="index.html" class="hover:text-white">소개</a>
        </nav>
      </div>
      <p class="text-xs text-gray-500 max-w-xl">시나리오 A: 이 도구 써도 되나? — 검색·필터 후 카드를 열어 근거를 확인하세요.</p>
    </div>
  </header>

  <div class="max-w-[1600px] mx-auto flex flex-col lg:flex-row min-h-[calc(100vh-73px)]">
    <aside class="lg:w-64 shrink-0 border-b lg:border-b-0 lg:border-r border-gray-800 p-4 lg:sticky lg:top-[73px] lg:self-start lg:max-h-[calc(100vh-73px)] lg:overflow-y-auto">
      <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">카테고리</h2>
      <div id="dkb-category-filters" class="flex flex-col gap-0.5 max-h-48 lg:max-h-none overflow-y-auto"></div>
    </aside>

    <main class="flex-1 p-4 lg:p-6">
      <div class="mb-6">
        <label for="dkb-search" class="sr-only">검색</label>
        <input type="search" id="dkb-search" placeholder="이름, 요약, ID로 검색…"
          class="w-full max-w-xl rounded-xl border border-gray-700 bg-gray-800/80 px-4 py-3 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50" />
      </div>
      <div id="dkb-card-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
    </main>
  </div>

  <div id="dkb-detail-backdrop" class="hidden fixed inset-0 bg-black/60 z-40 lg:bg-black/40"></div>
  <aside id="dkb-detail-panel" class="hidden fixed inset-y-0 right-0 z-50 w-full max-w-lg border-l border-gray-800 bg-gray-900 shadow-2xl overflow-y-auto">
    <div class="sticky top-0 flex items-center justify-between gap-2 px-4 py-3 border-b border-gray-800 bg-gray-900/95 backdrop-blur">
      <span class="text-sm font-medium text-gray-400">디렉티브 상세</span>
      <button type="button" id="dkb-detail-close" class="rounded-lg px-3 py-1.5 text-sm text-gray-300 hover:bg-gray-800 border border-gray-700">닫기</button>
    </div>
    <div id="dkb-detail-inner" class="p-4 pb-12"></div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/radar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
